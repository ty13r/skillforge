runtime:
  language: python
  version: "3.12"
binaries:
  - python3
python_packages:
  - regex
optional_binaries:
  - elixir@1.16
  - mix@1.16
optional_services:
  - postgres@15
notes: |
  score.py uses regex for static pattern checks on Elixir/Phoenix 1.7+
  LiveView source output. No Elixir runtime is required for scoring — we
  do not compile or execute competitor output. Optional binaries are for
  future rounds where challenges may ask for live render verification.
