# Railway deployment config for SkillForge
#
# We build via Dockerfile (multi-stage Vite frontend + Python backend), so
# Railway uses the CMD from the Dockerfile. The Dockerfile expands $PORT
# at runtime — Railway sets it dynamically per deployment.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
healthcheckPath = "/api/health"
healthcheckTimeout = 100
