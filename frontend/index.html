<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <title>SKLD.run — Evolve Agent Skills</title>
    <script>
      // No-flash theme boot. Runs synchronously before React mounts.
      // Reads the `skld-theme` cookie; falls back to system preference.
      (function() {
        try {
          var m = document.cookie.match(/(?:^|; )skld-theme=(\w+)/);
          var t = m ? m[1] : "system";
          if (t === "system" || (t !== "light" && t !== "dark")) {
            t = matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
          }
          document.documentElement.dataset.theme = t;
        } catch (e) {
          document.documentElement.dataset.theme = "light";
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
