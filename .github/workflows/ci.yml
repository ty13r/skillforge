name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend (ruff · mypy · pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.5.x"

      - name: Install project (+ dev extras)
        run: uv sync --extra dev

      - name: ruff
        run: uv run ruff check skillforge

      - name: mypy
        run: uv run mypy skillforge

      - name: pytest
        # Live tests are gated behind SKILLFORGE_LIVE_TESTS=1 and stay opt-in.
        env:
          SKILLFORGE_LIVE_TESTS: "0"
        run: uv run pytest tests/ --tb=short

  frontend:
    name: frontend (eslint · prettier · tsc · vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: npm install
        run: npm ci

      - name: eslint
        run: npm run lint

      - name: prettier
        run: npm run format:check

      - name: typecheck + build
        run: npm run build

      - name: vitest
        run: npm run test
