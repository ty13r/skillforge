    <!-- Theme color for mobile browser chrome -->
    <meta name="theme-color" content="#0B0F19" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon" type="image/png" href="/og-image.png" />
    <script>
      // No-flash theme boot. Runs synchronously before React mounts.
      // Reads the `skld-theme` cookie; falls back to system preference.
      (function() {
        try {
          var m = document.cookie.match(/(?:^|; )skld-theme=(\w+)/);
          var t = m ? m[1] : "system";
          if (t === "system" || (t !== "light" && t !== "dark")) {
            t = matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
          }
          document.documentElement.dataset.theme = t;
        } catch (e) {
          document.documentElement.dataset.theme = "light";
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
