runtime:
  language: python
  version: "3.12"
binaries:
  - python3
python_packages:
  - regex
optional_binaries:
  - elixir@1.16
  - mix@1.16
optional_services:
  - postgres@15
notes: |
  score.py uses regex + Python stdlib for static checks on Elixir source
  output. No Elixir runtime is required for scoring — we do not compile or
  execute competitor output. Postgres is only relevant if a specific challenge
  asks for migration DDL or similar database-state assertions.
