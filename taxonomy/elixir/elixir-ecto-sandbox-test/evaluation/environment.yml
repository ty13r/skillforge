runtime:
  language: python
  version: "3.12"
binaries:
  - python3
python_packages:
  - regex
optional_binaries:
  - elixir@1.16
  - mix@1.16
optional_services:
  - postgres@15
notes: |
  score.py uses regex + Python stdlib for static pattern checks on Elixir
  test source output. No Elixir runtime or Postgres instance is required for
  scoring — we do not compile or execute competitor output. Postgres and
  Elixir binaries are listed as optional for future rounds where challenges
  may ask for live sandbox validation.
